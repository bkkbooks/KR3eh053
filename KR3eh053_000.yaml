body:
  text: 辨痢疾之源痢疾一症古稱滯下乃時邪病也暑濕熱三氣之邪滯於腸胃三焦流行之機因之阻滯所以無非濕火蘊釀之積垢久之便傷腸中之脂液其現症也則裡急後重數至圊而不能爽其腹或痛或不痛或痛之極故曰滯下也蓋滯者氣血被邪迂滯之謂下者暴注下迫之謂也其病名最確又曰腸澼並無痢疾之稱後世謂之痢疾命名不切蓋利者通利之謂也而非滯下之後重窘迫明矣醫書每列於雜症門中初不指為溫暑時邪之疾又與泄瀉連類而及混同論治不分虛實寒熱致後人誤以泄瀉之法治痢而於難經五泄之義茫然無所分別徒知理脾健胃消導破氣溫燥亂投殺人無算殊不知小腸泄即大瘕泄也故其痛必在少腹及當臍小腸部也瘕者有似癥瘕塊痛則泄不爽如有瘕塊也熱傷氣分白凍多熱傷血分紅凍多赤白相兼氣血交病並非赤為熱白為寒也李士材王損庵諸賢皆有名論惜未究其本海虞吳本立有痢證匯參一書不過托拾前人方論瑜瑕並收不知棄短取長編者既少卓識又不能闡發此中精義不可為治痢指南至倪涵初治痢三方徒令印定後人心目皆無足取惟嘉言喻子議論頗詳時醫亦不參考餘數十年來目擊心傷臨症之暇殫心研究頗有一得聊與及門論之以濟斯人顏曰痢疾明辨條陳於後不正其名而仍曰痢疾者從俗也不揣譾陋就有道而正焉倘蒙高賢賜教則幸甚矣箝六經表裡陰陽虛實寒熱乃治痢要訣凡病必先辨六經一切外感內傷不能捨六經而為治痢疾何獨不然首太陽為諸陽之氣察其邪從太陽陷入者宗仲聖太陽例桂枝羌活為主從陽明陷入者葛根為主從少陽陷入者柴胡為主陷入陽明之腑有結有熱者三承氣選用有熱無結者黃芩湯諸瀉心湯選用此外感三陽痢之成法也失治則由三陽陷入三陰少陰經有寒症有熱症熱則黃連阿膠湯豬膚湯寒則桃花湯真武湯四逆輩厥陰經有寒症有熱症有寒熱錯雜症熱用白頭翁湯寒投吳茱萸湯寒熱錯雜進烏梅丸獨太陰有寒症無熱症所謂鶩溏是也理中湯為主方此是例也不獨痢疾為然一切病皆當察脈辨證使寒熱虛實陰陽表里八字胸中瞭然庶幾下筆無誤學者當先明此理辨痢大綱有四邪陷秋燥時毒滑脫一曰邪熱凡一切外感惡寒發熱忽而裡急後重下凍白色或出黃如糜此三陽經之邪熱下陷也而暑濕熱三氣尤多此病無論發熱與不發熱審其為三陽邪陷嘉言喻子用人參敗毒散論之為逆流挽舟法至精至妙論曰內經冬時傷寒已稱熱病至夏秋暑濕熱三氣交蒸互結其熱十倍於冬月矣外感三氣之邪熱而成下痢其必從表而出之故必從汗先解其外次調其內首用辛涼以解其表次用苦寒以清其里一二劑愈矣失於表者外邪俱從里出不死不休故雖百日之遠仍用逆挽之法引其邪而出之於表死症可活危症可安治經多人成效歷歷可記金匱云下痢脈反弦發熱身汗者自愈夫久痢之脈深入陰分沉澀微弱者忽然而轉弦數脈渾似少陽生髮之氣非用逆挽之法何以得此久痢邪入陰分身必不熱間有陰虛之熱則熱而不休今因挽逆之勢逼其暫時燥熱頃之邪從表出熱自無矣久痢陽氣下陷皮膚乾燥斷然無汗今以逆挽之法衛外之陽領邪同還於表而身有汗是以腹中安靜其病自愈此段議論從古無人論及乃治三陽外感邪陷之寶符也吾鄉前輩名醫薑恆瑞先生始用此法及門宗之審為邪陷萬舉萬當百無一失嘉言喻子恐淺學不能分經用藥舉活人敗毒散以為矩矱首用辛涼以解其表不使邪陷入里次用苦寒以清其里則河間丹溪清熱導滯之法躍然於言外矣陳韶九按逆流挽舟提舉陷邪喻氏設一人參敗毒散為例非謂不據何經悉可用此以主治也得此一説開悟後學不少引證舒進賢曰所謂邪陷者邪陷入六經而為痢也治法當從傷寒六經之例有何經之證即加何經之藥於其間合而治之如兼太陽表證有汗主桂枝無汗主麻黃兼太陽腑證仍主五苓兼見陽明表證加葛根兼見陽明腑證察其淺深而斟酌於白虎承氣兼少陽表證用柴胡里證用黃芩兼太陰虛寒之症附子理中湯少陰助相火而動者生津解熱厥陰純陽無陰之症破陽行陰純陰無陽之症溫經止泄陰陽錯雜之症寒熱互用陰陽並驅凡六經陷邪以六經合而治之無不立驗又鶩溏一證糞內帶清水如鴨屎嘗見於陷之中屬太陰藏寒主用耆朮薑附溫經散邪甲寅夏與及門論痢疾三陽濕熱最易下陷於手足陽明之腑失治則陷入三陰便屬棘手適以陳修園明府所著醫書數種見示者觀其痢疾門挽逆之道實獲我心節録於此以見陳修園曰醫書云脈沉小易治浮大難療又云發熱不休者死此遵內經腸澼一論執一不通之過也余別有所悟脈浮為表邪浮而兼大是表邪侵於陽明之界而下痢仲景有葛根湯等治法發熱不休非感冒風寒即是邪留經絡宜用桂枝湯四逆散祛風寒以調經絡人參敗毒散加老米名倉廩湯亦是此意大抵初病治法發熱惡寒者香蘇飲加防風川芎或四逆散以取微汗若寒熱往來多嘔者小柴胡湯若熱多而口渴者小柴胡湯去半夏加瓜蔞根主之若發熱不惡寒裡急後重者以葛根黃芩黃連甘草湯照古法先煎葛根後煎諸藥日服二三劑必愈若用痢門成方其邪無不陷入變危者豫深恨倪氏三方真是殺人之具愚按三陽經邪陷有虛實之分實者必陷陽明之腑俗云無積不成痢蓋因積滯引邪而入也虛者中氣之虛也活人敗毒散中有人參夾虛者必須加入以鼓舞胃氣至三陰陷邪宜遵仲景心法附録三陽邪陷醫案俾知虛實之辨瞭然心目以增見識醫案喻嘉言治周信川年七十三平素體健秋月病痢久而不愈至冬因成休息痢一晝夜十餘次面目浮腫肢體肌膚晦暗診其脈沉數有力此陽邪陷入之徵也吾意以法治之尚可全愈於是以人參敗毒散煎好用厚被圍椅上坐置火其下更以布條捲成鵝卵狀置椅褥上墊肛門使內氣不得下走然後以前藥趁熱與服良久遂覺皮膚津津微潤再灌以熱湯教令努力忍便不得移身如此約二時之久皮門津潤病者心躁畏熱始令連被臥是晚只痢一次不旬日而愈蓋內陷之邪欲提之轉從表出不以逆流挽舟法治之何可底哉閩王星宰患痢諸藥不效蘇郡先醫進以人參敗毒散其勢差減大有生機但少此一段斡旋之法竟無成功故凡遇陽邪陷入陰分如久瘧久熱之症皆當識此使其緩緩透出表外方為合法若急而速之則恐挽出又入徒傷其正耳吳興陸養愚治歸安李令尹之嶽路途感冒至署頭常微痛身體微熱飲食如故不以為意數日後患暑瀉小便赤痛自服胃苓湯不止後下赤白又服芩連檳芍廣木香二劑不效李公延豫診治脈兩手浮弦沉按澀數此表氣不舒故里氣亦不順偶值脾胃不調而泄瀉也以五積散加白朮木香二劑大汗諸症悉退盧紹安評云長途未免勞頓感冒表邪飲食失調業已成痢世俗惟投痢疾之藥此其常也先生以五積雙解表裡之邪得汗而諸症如失痢因汗愈非真知灼見孰敢如斯惺庵治塘橋龐微帆下痢晝夜約二百餘遍腹痛後重無片刻安初起本有微寒發熱之象至第二日寒熱已無第四日延豫治之見其神清音亮脈浮弦數用人參敗毒散一劑次早又服一劑晚用潔古芍藥湯製大黃三錢去桂枝是日下痢百餘次第三日再進敗毒散一劑加白芍木香檳榔汁至晚痢減十之七三更時又進芍藥湯熟軍只用二錢白芍用肉桂炒是夕出溏糞頗多痢減大半又投芍藥湯去桂枝大黃加桔梗是夕下痢尚二十餘次明日停藥一天次早用輕劑漸次平安為時不過十日而愈症雖重每日尚能吃粥三碗故能應手時道光己丑八月也承守丹明經體質素虛壯年即耳聾不寐患三陰瘧忽然轉下痢赤白裡急後重神氣昏倦面色晦滯瘧發之日昏沉如蒙延豫治之謂曰此少陽之邪陷入太陰少陰法宜逆挽使伏邪出表瘧重則痢自減痢重則熱反輕然活人敗毒散宜重用人參加木香如是二帖果瘧勢重而痢勢輕但腹痛未止於是停藥一日仍用敗毒散次日用四君子合小建中湯送香連丸衝入木香檳榔汁停藥一日又進敗毒散翌日仍進四君建中香連痢即止瘧仍如期用丸藥補正托邪明年方愈孫姓婦年四十餘體質極弱甲寅秋患痢嘔吐不止醫進黃連參術不愈痢反劇投藿香正氣散又不應進連理湯又不應易一醫進溫澀之劑烏梅粟殼肉果乾薑症反重日夜七十餘次又一醫用人參薑附痢稍稀翌日發熱惡寒延豫診治脈得浮數微弦其夫謂豫曰下痢身熱法在不治也豫曰此陷邪出表乃生機也議小柴胡湯病家不肯發表於是停藥但飲粥湯痢漸稀令其用荷葉粳米桔梗益元散薄荷治湯飲明日胸腹白㾦滿布微汗熱退痢止而愈此症溫補誤治而劇勿藥而痊或曰此婦平日常吃冷粥冷飯多啖瓜果服參附去其脾胃伏寒故邪寒得從外達理亦有之仍偶然也然三陽陷邪誤進溫補而死者不可勝數必發出陷邪透出紅白㾦暑濕之邪方退耳一人病霍亂明日發熱下痢進敗毒散二劑赤白未止而身發斑議再投敗毒散以發表合犀角地黃湯以清裡加檳榔木香青寧丸以理氣導滯兩劑而愈童佩芬茂才冬初伏暑兼挾秋燥患痢守不服藥之戒已將匝月醫進青寧丸燥矢去而痢不減又進制軍亦不應此時投逆挽法尚可圖治乃易治進附子理中加杜仲肉果阿膠二三劑痢不止而口燥舌紅脈數大有力延豫治之豫謂伏邪未經透表提出陷邪徒用推蕩無益於事然亦未受害也用肉果白朮等藥非太陰病而誤投之則受害更深矣安能挽回書清火育陰方而辭之後聞咽痛舌碎而斃以上略舉三陽下痢症萬不可用溫補引邪入里致傷人命切戒切戒又按外感三陽痢夾內傷者頗多一時難辨有內傷多而外感少者有外感重而內傷輕者宜分別先後緩急而治故舉一二成案為則喻嘉言治張君仲儀仲秋得痢疾日三五十行即請往診行動如常然得內傷之脈而夾少陰之邪豫診畢議此宜一表一里但表藥中多用人參里藥中多用附子方可無患若用痢門諸藥必危之道也仲儀以平日深信遂取前方不疑然疾勢未著也及日西發大熱身重如巨石頭在枕上兩人始扶動人事昏迷舉家惶急忙忙服完表裡之劑次早診時即能起身出房又與參附二劑遂得安全若不辨證用藥痢疾幾曾有此治法況於疾尚未著者乎陳韶九按所謂內傷之脈者必右手空虛無力少陰之邪必欲寐口不渴審證確當故敢放膽用之生生子治大宗伯董潯陽門下馬廚者九月初旬病痢延二十餘日危在旦夕寒熱極重寒至不憚入灶熱至不憚入井痢兼紅白日夜八十餘行腹痛噁心汗多神倦蔣洪喬沈萬二人述其病狀而請於豫豫曰脈如何蔣沈曰下痢脈洪大者死細數者生今洪大者逆也豫曰痢忌洪大而寒熱又不宜細數其中必有故豫往診其脈果如所言詢其致疾之由病者云日前客衆廚間燥熱食瓜果過多晚又過飲御內而寐於樓簷下翌日即寒熱腹痛因而下痢豫雖得其病情尚未融通一治法沉思良久作背城一戰人參石膏滑石各五錢大附子炙草各二錢作一劑煎服謂曰倘得一睡則陰陽和和則汗可斂而寒熱嘔吐可止也明晨巳刻再診痢減半汗吐止脈亦斂再用人參石膏白朮白芍滑石炮薑知母各二錢肉桂二錢炙草附子各一錢服後熱止痢又減半食漸進神氣漸轉改用酒炒白芍三錢人參白朮滑石各二錢甘草炮薑廣皮各一錢三劑而痢止食進蔣沈問曰公寒熱均投此謂何症而劑何名乎豫曰此滑公所謂混沌湯也經曰夏傷於暑秋必痎瘧白虎益元散皆解暑之劑瓜果寒涼傷其中氣酒後御內損其下元附子理中正所以溫中補下者經云實者邪氣實也白虎應之虛者正氣虛也故理中應之若以寒熱均用為嫌則仲景附子瀉心湯既用大黃黃連又用乾薑附子此何説哉蓋假對假真對真也陳韶九按凡病之成立必有兩個以上原因所謂單絲不成線也按喻嘉言之治前案乃三陽下痢而兼少陰病者用活人敗毒散重用人參以提出其下陷之邪又用少陰附子湯重用附子以溫其里此案陽明經感暑濕熱三氣如焰如焚大汗淋漓非白虎不能驅其暑熱而酒色戕其下瓜果傷其中非參附不能救其脾陽此太陰陽明一表一里同時受病與溫病之兩感無異白虎理中合用乃正治法也由此推今之暑濕伏邪等病豈非兩感症乎皆宜察脈辨證胸中了了方可立定主意用藥試觀今之發熱脈微數日即變者皆此類也附識數言以為學者告附上盛下虛陽明少陽熱邪太陰少陰厥陰裡寒一案舒進賢治天慶班小生患痢甚危七日不食其症上身有熱下身作冷此陽熱在上陰寒在下也心中煩熱乃陽明裡症法用石膏口苦咽乾乃少陽腑症法用黃芩食不下屬太陰宜用黃耆白朮半夏砂仁身重多汗者少陰亡陽也法用熟附子乾薑厥逆腹痛者厥陰裡寒也主用生附子吳茱萸因其陰陽錯雜藥即寒熱並用一劑病略減再劑心中煩熱口苦咽乾上熱下寒厥逆諸證均已於是方中減去石膏黃芩生附子加甘草茯苓數劑而愈附三陽三陰六經之邪皆陷一案又治陳春元侄患痢紅白相兼身發熱而食不下醫謂受暑用香薷黃連多劑痢轉紅不能起床延豫視之其症惡寒發熱頭項強痛者太陽表證也前額眼眶連兩側痛者陽明少陽之表證也胸膈不開飲食不下屬太陰少陽之候也目瞑身重少氣懶言屬少陰見症且見厥陰之腹痛拘急逆上胸膈此症邪陷六經皆具矣用桂枝葛根柴胡以解三陽之表黃耆白朮半夏砂仁為三陰理脾開表附子乾薑走少陰溫經散邪吳萸川椒入厥陰去寒降逆一劑寒熱清而頭痛止痢轉白而無紅其三陰之證仍然未減於方中去三陽表藥再劑飲食漸進腹痛略止痢亦稍輕將前藥再服三劑而愈附少陽兼太陰陷邪案又治一人寒熱往來口苦不食痢紅白兼緑凍又帶清水有知醫者問曰此噤口痢也主用黃連乎凡不能食皆名噤口然而有寒熱虛實陰陽表里之不同觀其外證少陽之經證也緑凍少陽之本色也清水如溏屬大陰之藏寒也少陽經證主表太陰藏寒主裡其陰陽表裡懵然不辨妄投黃連必殺之矣問者聞而愕然復問曰當以何法主治乎曰主以小柴胡加白朮茯苓附子肉桂一劑而效三劑而愈附三陽陷邪兼太陰臟寒下痢赤白夾血一案壺蘆山人治貢楚翹孝廉下痢赤白兼血而脈緩弱進人參敗毒散先解其表其脈仍緩弱無力脾虛兼暑也用附子理中加香連白芍而愈蓋孝廉有胃寒暑月食瓜加以火酒又值中年以後中虛之故當日同議者貢上之先生也此亦外感兼內傷者陳韶九按外無寒熱表證進敗毒散似嫌不合附子理中亦嫌過峻河間苦辛寒方確合此病附陷邪未經表散而先下一案吾鄉老醫孫御千於乾隆戊子七月治李諧禹令政趙氏年十七歲患痢極重乃翁招御千入城診視痢已五六日始純紅繼白色相兼今下紅白黏膩日夜四五十行後重窘迫多在腰尻尾閭之間少腹不過微痛胃口不能納食閲前方並未外解用硝黃攻下而劇外邪暑熱凝結下焦無從解散先疏其壅用川連生薑秦艽枳殼木香汁檳榔汁楂肉神麯桔梗鮮荷葉陳倉米煎湯服一劑次日墜痛少減腹中喧響矢氣甚臭滯未盡而有糞色且知飢納穀書謂下痢矢氣者當利其小便急開支河以通之滑石茯苓甘草扁豆花川連青皮廣皮阿膠白芍荷葉服二劑八月初二早診痢已減半谷納漸增脈皆和緩獨右尺動大少平遏邪陷於大腸之分未盡擬將欲降之必先升之法羌活升麻防風南沙參滑石生草茯苓廣皮楂肉檳榔乾荷葉炒陳米煎湯晚又進末藥一服地榆銀花木香楂肉麥芽茯苓廣皮甘草以腸胃病宜散不宜湯也初三日痢止便溏肌肉潤澤有汗神志清爽谷納頓加脈細弱而數痢後陰虛宜用阿膠白芍炙甘草扁豆建蓮廣皮茯苓砂仁數劑而愈一曰秋燥秋燥者火之餘氣也濕之復氣也其時大火西流燥氣盛行故痢每甚四氣五氣之間因濕熱最傷肺氣肺氣不肯受邪傳之於腑肺火鬱於大腸其腹痛甚所下皆赤白膿血黏稠其症甚重陰虛者尤多患之金匱云肺痛者非肺痛也肺氣下鬱於大腸故痛也宜用桔梗以開之苦寒以化之滋陰以潤之金匱主紫參湯紫參不知何物張璐以紫菀代之亦是開泄之義此症忌用敗毒散以風藥多燥也忌大下陰虛者下之復傷其陰也忌補氣氣愈滯則燥愈甚也張飛疇云此症補氣死攻積亦死宜白頭翁湯加甘草阿膠湯豫嘗用黃連阿膠湯加桔梗多效每見此症夭枉者甚多喻氏云水出高源肺氣清則小便自行肺與大腸為表裡大腸之熱皆因肺熱所積尤宜用辛涼之藥清化肺源況腸胃有病其所關全在乎肺本草謂紫參治心肺腹中痛疏積聚療腸中熱通九竅利大小便仲景取通因通用之意可見肺氣不通而痛則急通其壅可知矣愚按嘉言此論即秋燥之根本豫所見患此者多極醫者不識故詳及之引證舒進賢曰秋燥者秋分以後燥金主氣之時涼風漸起暑氣退而熱氣收天氣清而土氣燥起居咸康然天道靡常時有不正之氣溷於清肅之令轉令暴行謂之秋燥其燥氣上浸於膈即乾咳失音咽痛心煩肌無潤澤法宜玉竹天冬桔梗蔞仁雞子白其燥下侵腸胃則腹痛下痢裡急後重皮毛焦稿索瑟無汗心躁咽乾法宜生地阿膠桔梗蔞仁雞子黃燥與火不同火為實證陽亢熱甚身熱多汗宜苦寒奪實而瀉其熱燥為虛證陰虧失於潤澤肌膚乾燥宜苦寒滋其陰而潤其燥又與陷邪不同陷邪有濕熱有脾虛此為陰虛耆朮砂仁半夏萬不可便投也附秋燥痢醫案舒進賢治一人身體熯燥聲音重濁腹痛心煩口燥無味痢症日增痛愈甚曰此秋燥症也用阿膠生地各四兩桔梗甘草各二兩濃煎不時與服一日一夜完畢人事蘇暢各證略減忽思鮮魚下飯即與之食訖得汗其病如失或問此症腹痛有寒熱乎余曰否肺氣為燥氣壅遏入腹中搏結作痛但清其燥氣則無往不得矣壺蘆山人治尹山令弟秋燥下痢腹痛異常赤凍有血醫進敗毒散及辛溫燥劑症反增重舌紅口燥澼出無度延豫診脈澀數進黃連阿膠湯加桔梗荷葉白粳米湯並進兩劑痢減半再將前方去桔梗加益元散炒銀花知母三服而愈時道光庚子秋也論秋燥亦因歲氣盛衰孫氏御千曰乾隆戊子少陰君火司令小滿後夾三伏之氣正屬主氣客氣亦屬君火加臨二陰盤旋太虛風火自出日日風火亢旱自春至秋逢風熄之日則炎熱異常立秋後上自湖廣下至江浙皆患疫痢色赤或五色相兼雜虛者受之必噤口而入臟肢冷五六日告斃矣輕者由赤轉白乃愈瘧疾絶少夫火盛之年本能生土旺胃因木火同性肝膽肆橫挹取胃中津液腸胃中被竊空虛暑毒乘虛內襲故患痢者多瘧乃少陽經病木旺邪不入故少本年治痢以肝為剛臟宜制以柔用阿膠白芍胃為陽土喜通惡塞用人參茯苓甘草陳皮通補胃陰荷葉升清陳皮理氣銀花清少陰君火而解毒加檳榔汁以疏通腸中之壅同薑體干酌定無不應手取效一曰時毒時毒乃疫氣流行或因天氣亢旱暑熱異常或因天時大水濕熱鬱蒸或因水氣偏勝一方盛衰不同其病速其症重每有二三日告斃者逆挽法輕不可廢而鞭長莫及苦辛寒急下之法不可緩投喻氏曰有驟受暑濕之毒水穀傾囊而出一日夜七八十行大渴飲水自救此腸胃為熱毒所攻傾刻腐爛更進逆挽法迂矣通因通用之法大黃甘草川連一日夜連進三五十次俟其上渴下痢之勢稍緩乃平調於內更不必挽之於外蓋其邪如決水轉石乘其勢出盡無可挽耳更有急開支河一法其邪熱之在裡者奔迫於大腸膀胱熱急則氣不化而小便短赤不用導赤而用逆挽仍非計也清膀胱之熱令氣分行而分消熱勢則甚捷也仲景謂下痢矢氣者當利其小便非急開支河之謂乎引證舒進賢曰時毒者天行疫癘時氣流行觸之為痢外見心煩惡熱口臭氣粗渴欲冷飲腹滿攪痛鼻如煤煙肛門似烙乃熱毒內攻臟腑有立壞之勢急宜三黃陡進以救內焚加桔梗開提肺氣宣其壅而舉其陷腹痛自止熱毒除而疫癘消下痢亦愈此症腹痛乃肺氣為火熱所迫陷入腹中壅滿遏甚而為擾痛與虛寒腹痛不同虛寒者腹不滿喜手摩按法宜溫補火熱內壅者其腹滿不喜摩按耆術溫補毫不敢犯即如陳皮木香厚朴等藥皆不可用惟有桔梗開之一法投之立應陳韶九按用桔梗開提亦必加於苦寒藥中如三黃解毒湯加桔梗此神劑也豫曾驗過繆仲醇曰時行疫癘一症三十年前間或有之今則往往夏末秋初沿門闔境患此其症發熱頭痛口渴躁煩痢而溺澀甚者一日夜僅百餘次或兼發斑疹熱甚危迫世醫妄指為漏底殊不知此時氣使然因世人稟賦漸薄積感濕蒸癘氣所致法當清熱解毒表散為急如升麻葛根柴胡黃芩黃連之類或熱遏甚前藥可加寒水石更有別症以意加減切忌破氣收澀犯此多致不救愚按仲景傷寒論中凡寒熱泄瀉熱結旁流等症統曰下利毫無分別故方書每以泄痢二者混同立論繆氏此論亦舉泄痢而統言之學者未免混蒙須知滯下亦屬時行雜感與暑濕霍亂洞泄飧泄協熱下利熱結旁流同源異流皆時毒所致有赤白積垢裡急後重者痢疾也無是者非也治法總是表裡雙解下手稍緩去生便遠時行之病大率類是余長子十八歲亦以此症殞命當時擬敗毒加制軍芩連雖曰小效而邪仍內陷發熱咽腐而斃早知繆氏之説當不至此附時毒醫案喻嘉言治朱孔揚年二十五歲形體清瘦素享安逸夏月因㪺訟奔走日中受暑濕內蘊之火而成痢疾日夜一二百次不能起床以粗紙鋪於褥上頻頻易置只飲水而不進食其痛甚厲肛門如火揚手擲足躁擾無寧豫診其脈弦緊徑急不為指撓謂曰此症一團毒火蘊結在腸胃之間其勢如焚若二三日外腸胃俱腐臭矣於是以大黃三兩黃連甘草各二兩入大砂鍋內煎濃隨滾隨服服下人事稍寧少頃仍作躁擾一日夜服至二十餘碗大黃俱已煎化黃連甘草俱已煎至無味次日病者再求煎藥余診畢見脈勢稍柔知病可愈但用急法不用急藥遂改用生地麥冬各四兩另研生汁而以花粉丹皮赤芍甘草各一兩煎和前汁大碗咽之以其來勢暴烈一身津液從此告竭待下痢止後生津養血則枯稿一時難回今脈勢既減則火邪已退不治痢而痢自止豈可潤滯之藥而不急用乎服此藥果然下痢盡止但遺些少氣沫耳第三日思豆腐漿第四日略進陳米汁緩緩調之旬余方能消穀亦可見胃氣之存留一線不可少此焦頭爛額之客耳附録繆仲醇治毒痢及發疹時毒痢方鮮金銀花三兩濃煎三大碗入生地榆五錢川連炒槐米各四錢川柏黃芩各二錢酒炒白芍三錢炙甘草三錢醋炒緑升麻六分同煎一碗調飛滑石五錢不拘時服一曰滑脫滑脫每見於久痢之後三氣之邪已盡五臟之氣不固所以不過微黃稀水並無赤白凍亦無裡急後重小便不赤口舌不燥脈沉細而弱審定屬虛寒者方可用溫澀之劑仲景所謂陽明不闔太陰獨開下焦關閘盡撤以赤石脂禹餘糧湯必如此而後可曰滑脫也豈可以裡急後重至圊而不爽日夜無度者亦曰滑脫哉生死關頭不容不辨每見市醫治痢並非滑脫誤進粟殼肉果補骨脂杜仲菟絲子等兜澀之劑殺人無算引證舒進賢曰滑脫者由病後久虛脾胃土敗腎陽衰乏中氣不固下陷而為滑脫法宜大補元氣扶陽固腎理脾健胃更加澀以固脫方用人參附子肉果鹿茸炮薑半夏砂仁川椒芡實山藥故紙益智仁圓肉大劑多進俾令陽回陰消脾胃強健腎氣收固元氣大復滑脫自止繆仲醇曰凡治滯下與大腸滑泄自利不止不同滑泄自利不止有可澀之道故古人有間用罌粟殼及訶黎勒以止其滑脫並泄若夫滯下本屬濕熱澀滯不行法宜疏利藥忌兜澀大腸腑之病也大腸既有濕熱留滯肺家亦必有熱肺為華蓋之臟經曰脾氣散精上歸於肺通調水道下輸膀胱是肺氣喜通利惡閉塞故古人藥性中每云利肺氣大意概可知矣倘誤用粟殼訶黎勒使濕熱無所宣泄肺氣不得下行非惟滯下增劇濕熱熏蒸上干乎肺則且脹悶氣逆不得眠不思食諸症至矣陳韶九按滑脫可澀滯下不可澀蓋謂脫者邪氣已盡元氣已虛滯下者濕熱未清邪積猶留審證不確死生反掌可不懼乎醫案喻嘉言治浦君藝痢初起有表邪未散誤用參術固表使邪氣深入又誤服黃連涼膈大黃推蕩經治月餘胃氣不運下痢一日夜百餘行一夕嘔出從前黃連汁三五碗嘔至二三次後胃與腸打為一家內中幽門闌門洞開無阻不但粥飲直出即人參濃膏才吞入喉已汩汩從腸中奔下危急之中諸崑玉及諸內戚俱探余曰此症可無恐乎豫曰在此用藥便有可恃吾豈不知痢勢之危但別無可任姑以靜鎮之而殫力以報於知己耳於是以大劑四君子湯煎調赤白脂禹餘糧二味連連與服服後下痢之勢稍衰但腹中痛不可忍君藝謂余曰前次下痢雖多然尚不痛服此而痛增未可再服矣豫曰此正通則不痛不通則痛之謂也不痛則死痛則安何樂而不痛也仍以前藥再進症勢漸減統用四君子倍茯苓十餘劑而安葉天士治喬姓初起無寒熱即瀉痢嘔惡不食此噤口重病暑邪之傷由口鼻吸入邪與水穀交混蒸變濕熱釀為積滯血膿腸胃氣窒欲解不能通暢遂致裡急後重香連苦辛理氣導濕清熱初用頗是但平素勞碌非膏粱溫養之體質淡薄積勞中氣易傷四十日余積少痛緩似屬病解然食不下咽不知飢餓診得脈弦形衰舌白不渴飲水自瀉全屬胃倒氣奪中宮虛極下關不攝穀食不能下咽焉能承受湯藥味氣之劣胃衰必惡久痢久瀉務在自食古人非醒脾即安腎攝納再詢粉漿下咽或嗆或噎議以上脘宜通其清陽下焦當固攝其滑脫仿古人方中參苓白朮散末佐以米飲日服二次間以不膩滑之物日食少許以示胃之所喜為補必得胃氣漸醒方可轉危為安方用人參二錢焦白朮一錢半茯苓一錢半炙草五分炒扁豆二錢桔梗一錢苡仁一錢半砂仁八分炮薑一錢肉豆蔻一錢上藥共研細末稱準分量每次以香粳米湯飲調服一錢半日進二次陳韶九按此要訣也所謂吃不死的痢疾謂其有胃氣也治久痢大法盡於此矣病至滑脫若只圖固攝而不佐宣通則病雖減而胃氣難復也痢疾初起亦有用補塞者附録一案備考吳興陸養愚治吳南丘八月間醉後御內明日患痢一日夜百餘次赤白相兼狀如爛肉腹中作痛四肢厥冷脈緩無力兩尺尤弱余曰即宜補塞處方先書人參肉果二味其諸子大駭曰無積不成痢豈一二日即用補塞者乎豫姑以調氣養榮湯不進不退明日又診還宜補塞諸即又力爭仍以前湯加人參而彼竟不加亦無進退一醫進芩連檳榔本香等藥腹痛加劇足厥如冰冷時時少氣不足以息所食之物即從大便而出色竟不變復延余診進而視之身體不能轉側大便如流勢甚危急而兩脈神氣俱未絶因用大料附子理中湯倍人參加肉桂肉果一帖腹痛稍減數劑足溫泄少後用人參至兩斤始起鬚髮盡落陸潤生評曰病有反治有正治有常治有變治痢久而通因通用者反治也通久而塞者正治也然而初起用通者常治也初起用塞者變治也知反知正尤宜知常知變方為合法吳南丘諸公子執無積不成痢之常法而不知尊君脈症之虛若非神手幾敗乃事陳韶九按此症開手即用補塞全在脈緩無力兩尺猶弱上著意所謂胸有成竹眼底無花不過仍為傍議奪意未能斷然處方致有此變甚矣醫事之難豈易言哉蓋芩連檳榔重墜元氣氣被耗殘故腹痛如割足厥氣少者少陰關閘廢弛也以上四大綱邪陷秋燥二證患者極多亦有邪陷兼秋燥者亦有邪陷繼而陰傷化燥者至於時毒疫痢每盛於亢旱酷暑之年暑濕病亦多有之若滑脫則不多見久痢之後邪淨正虛者始有此症患者極少切勿以裡急後重者誤作滑脫治之致成久痢或正虛邪戀邪正同歸於盡而死不可不慎痢因暑濕熱三氣痢疾一症盛於夏秋暑濕熱三氣與食滯交蒸互結為病蓋濕為黏滯之邪熱為無形之氣積為有形之滯必用苦辛寒清熱導滯如溝渠壅積汙濁不能一通即愈一下即安故七日內初進喻氏法次宗河間法丹溪法無不應手痢不獨濕熱內經云春傷於風夏生飧泄此因風之伏氣至夏始發也又曰飲食不節起居不時者陰受之陰受之則入五臟入五臟則䐜滿閉塞下為飧泄久為腸澼常恣縱口腹肥甘濃厚傷及腸胃或多食瓜果陽氣被抑反受生冷之害須知腸胃一傷不能轉化精微傳送糟粕壯者氣行則已弱者著而為病蓄積停滯而為痢矣故戴元禮曰痢疾古名滯下以氣滯成積積滯成痢治法當順氣為先故古法清熱導滯方中必用辛溫藥味為反佐如潔古芍藥湯之肉桂瀉心湯之乾薑皆先正法程也按春風伏氣至夏腸澼亦是下陷活人敗毒散亦對症之妙法也辨治痢與治瀉不同泄瀉有寒有熱有濕有食積有清氣下陷之不同用藥有溫燥分利之異痢則純乎暑濕熱與燥火交結為病復有邪陷秋燥時毒之別或涼或潤或宜推蕩或宜清暑最要清暑化熱不忌清滋滑潤溫燥萬不可投耆術萬不可用與治瀉有天淵之別每見治痢者輒進薑附二術溫燥之劑誤人不少明乎仲景六經辨證之法可無此等之弊辨痢屬大小腸之病心與小腸為表裡暑為君火心氣應之故暑先入之心不受邪移與小腸盛受之官不能化物故當臍腹痛膿血黏稠數至圊而不解便所謂暴注下迫皆屬於火也肺屬金為嬌臟體燥而畏火暑熱迫之移於大腸傳導之官不克變化而出糟粕由是膿血難下赤白相兼糞矢壓於廣腸致後重窘迫其勢甚苦從未有人説破此理特為倡明辨痢屬脾胃濕熱當分陰陽虛實脾為己土屬陰濕襲之便為寒濕胃為戊土屬陽濕襲之化為濕熱痢者濕熱病也脾不運化濕熱襲於陽明者居多故痢疾每多見陽明病或通因通用或寒因熱用導去腸中之熱則濕亦漸化矣若脾之寒濕為病當溫脾化濕此屬太陰病不可混治辨痢疾有燥矢凍膩旁流下痢膿血稠黏必有燥矢結於腸內故後重窘迫屢下不爽結於廣腸則後重更甚赤白腸膏皆從燥矢之旁流出燥矢一日不去腸膏一日不止每見用升柴升提而後重依然如故者何哉蓋無形之氣下墜可升有形之滯壓於肛門不能升也當用大黃下之大解頓然通暢燥矢盡去後重如失腸垢自無霍然而愈若元氣稍虛者燥矢化作小塊陸續而下一時不愈必待數日屎多凍少漸次而愈無論陷邪秋燥時毒均有燥矢結於陽明者此理前人亦未發明也附醫案憶道光戊子七月先君七十七歲患痢腹痛後重日夜三十餘次進敗毒散用人參是夕不減明晨又進一劑謂士英曰豫收視返聽覺致疾之處在小腸下口接大腸地病至其痛令人難堪所以痢下不起者頗多不肖於是晚進敗毒散半劑明晨進潔古芍藥湯制軍用三錢至下午大解栗糞數枚尚有凍膩傍晚又大解燥矢二三寸者數枚諸症如失即飽餐夜飯從此霍然先君平日勤修好學內養功深嘗謂不肖曰守真劉河間云和血則便膿自愈調氣則後重自除二句切中是病糞結而不行凍系腸膏因後重逼迫旁流而出前賢不説破者要後學用功心悟耳辨痢因邪滯廣腸藥難立到致後重窘迫痢因邪滯大小腸其回轉曲折之處用藥已難清理邪滯廣腸燥矢壓之後重窘迫痛苦萬狀煎藥一時難到病所蓋湯者蕩也僅能蕩滌中上焦無形之邪廣腸在下焦極下之處其道遠其邪深必用苦寒有形之藥滌之導之方能直到病所青麟丸滯下丸甚者當歸龍薈丸均為應用之劑古人必用檳榔者正為此耳吾鄉祝思佳君病痢進敗毒散以提陷邪渠欲速效吸洋煙而痢益不爽肛門如有刺毛刺痛豫謂一團濕火結於肛門必須通之用青麟丸芍藥湯重用大黃皆不效服更衣丸始去結糞數塊又進龍薈丸三錢大下結糞數次而瘳因知後重逼迫肛門如烙乃濕火結成宿垢滯於廣腸之故也辨腹痛有火有滯有肝邪橫逆有傷臟陰之不同濕熱與食滯互結定然腹痛痛在中脘陽明病也痛在當臍及少腹大小腸病也皆因食滯與濕熱阻滯氣分並傷及血分不能運行所致治當清火理氣導滯所謂和血則便膿自愈調氣則後重自除至於肺火鬱於大腸小腹之痛尤劇宜桔梗以開提之紫菀以辛潤之痛或挾肝邪白芍在所必用膿血剝膏從中刮下焉得不痛吳人謂之刮積正是此意若傷陰而痛皆因痢久腸膏竭絶邪已盡去扶正補陰可愈邪未盡出雖補無益必至邪正同歸於盡而已再按邪正相搏則痛氣分鬱結則痛血分凝結則痛其有不痛者人多忽之不知邪正混合為痢雖重腹亦不痛最宜詳審陳韶九按此節卻道人所未道最宜注意不可以不見痛而便斷為虛寒遽投溫補也辨痢不腹痛痢有不腹痛者乘其元氣未傷投劑宜峻如發表攻裡清熱化濕蓋濕熱極盛正不與邪爭故不痛也若是寒邪邪正相爭亦必腹痛醫家病家每以不腹痛而忽之遷延日久必多誤事治痢七日以內用藥宜峻不可因循誤事痢疾初起乘其元氣未傷投劑宜峻如發表攻裡清熱導滯理氣等法萬不可緩若膽小用疲藥因循誤事致延成久痢或休息痢甚至因邪致虛正虛邪實誤人性命者醫之過也治痢又不宜鹵莽峻攻致傷治痢宜相人之虛實察寒熱表里陰陽斟酌用藥庶無太過不及之弊若一味孟浪攻補亂投禍不旋踵必須察脈辨證而又不拘於俗見不泥於成見當清則清當下則下當補則補實有把握方不愧為司命辨治痢用補中益氣之謬痢為滯下因氣滯血凝失流利之常度而成宜利氣不宜益氣宜疏通不宜壅滯耆術呆鈍之物非特閉氣留邪抑且就火化燥若為因後重而用之則有形之燥矢壓重肛門用升柴升之無益徒使虛火上升而後重窘迫如故也若謂中虛而補之則留邪遺禍也豫表叔曹士禎先生年近古稀患痢醫者初起亦用敗毒散以解表苦寒以清裡旬日外未痊慮其年老用補中益氣湯從此更重矣延至十一月延豫治豫曰此因補留邪之誤也用香連丸青麟丸以撤邪至正月方愈豫見此證誤治甚多不可不辨至人參仿人參敗毒散外亦不可輕用辨治痢用二術之謬蒼朮雖燥濕而滯邪用之於寒濕則可用之於濕熱則不可白朮則壅閉氣分更非所宜常見服此者皆纏綿難愈亦有因此殞命者至山藥扁豆皆不可輕用繆仲醇治一少年名貴介暑月外出飲食失宜患滯下途次無藥歸則腹痛不已遍嘗諸藥入口痛甚亦不思食仲醇視之曰此濕熱耳其父曰醫亦以濕熱治之而劇仲醇曰投何藥曰蒼朮厚朴枳殼等曰誤也術性溫燥善閉氣故滯下忌之少君陰虛人也尤非所宜以滑石一兩為細末丹皮汁煎之別以酒炒白朮五錢炙草二錢炮薑五分水煎調滑石末服之須臾小便如注痛立止引此以證用術之誤血痢痢下純紅或鮮紅或紅紫相兼二者皆濕傷及血分此極重之候也必用苦寒以清其熱歸芍以和其血製大黃青麟丸在所必用潔古芍藥湯東風散皆對症之王道藥時賢陳修園曰醫書云下痢純血者死按其治法不過阿膠地榆槐米之屬安能救得死症如果鮮紅下奔口渴溲短裡急後重脈盛者乃火症宜白頭翁湯一日兩服虛人及産後加甘草阿膠亦有鮮血而非火症者血帶黯而成塊俱宜從脈症細辨附血痢色鮮色黯治驗繆仲醇治陳督學因校事過勞感暑滯下純紅醫皆難之陳刺史曰此非仲醇不能療也使者旁午得至吳門一日夜馳至武陵仲醇診得其所由用人參五錢升麻七分炙草錢半烏梅二個紅曲二錢黃連三分白芍三錢蓮肉四十粒煎調滑石粉五錢兩劑愈督學曰痢止矣心搖搖不能閲案奈何仲醇曰此勞心太過暑因客之故耳加棗仁乾葛竹葉一劑遂平吾鄉戚孟楊先生治潘金奎裡急後重腹痛下痢純紅不爽日夜二十餘次脈沉弦數有力以暑濕滯食兼時毒傷血也用潔古芍藥湯去桂易炮薑炭加地榆銀花荷葉陳米湯煎三帖而愈又治一人血色晦黯脈細如絲腹痛作嘔後重逼迫十餘日飲食不進用黃芩湯加炮薑地榆桃仁枳殼楂肉伏龍肝荷葉陳米服之血漸少後用連理湯而愈下痢血水下痢血水或如洗魚之血水或如豬肺之血水者此濕熱俱重蘊結於魄門煎湯不能到其處用桂元肉七枚每個包苦參子仁七粒空心淡鹽水送下宜間日服之以待脾之運化若日日服之囫圇之物一時消化不及恐反妨飲食耳此方先大夫得之都中本治濕熱便血百藥無效用此愈人甚多治病在廣腸必用有形之物苦泄之而又恐苦寒敗胃用桂元之甘溫包於苦參之外先到胃中甘溫之味先化苦寒之味未彰直至小腸大腸以至魄門苦乃直趨於下俾濕熱之陷於極下者始得清耳用藥之妙如此方書以下痢血水為死證未必盡然附暑濕下痢血水急症案國初云間清白里老醫治吳玉榮令郎琴五於八月十三日患痢裡急後重似乎輕症惟脈沉數積滯不清熱邪鬱伏之象也即告以勿輕視當清虛淡泊為主越數日內熱甚日夜百餘次皆血水後重逼迫肛門如火灼小便不利諸醫皆進消積和血藥反脈大身熱血水如注議者皆以為不可治余曰脈證雖危尚有善狀胸膈舒暢粥飲可進身體輕快積色鮮明無臭穢之氣熱勢雖甚腸胃未傷此係暑邪傷其津液無形之火為患也必得有形之水制之用井水調益元散與之並以西瓜汁間服一日數十碗方覺快爽以黃芩芍藥湯加川連枳殼滑石木通銀花之類治之而安蓋此症不宜用消導和血之藥者乃無形之暑邪為患耳半月間用西瓜四十餘枚井水調益元散三十餘碗黃連五兩餘肛始不熱口始不渴若以痢門常法治之則津液愈耗綿延日久而斃者多矣下痢如屋漏水方書載下痢如屋漏水者死亦未盡然夫所謂屋漏水者即紅黑色之水也或如赤豆汁或如糖芋頭汁混濁不清治以苦寒清火而兼分利以化其濕無不皆痊始知屋漏水非死症也豫每用單方黃鱔去腹雜及血風乾炙灰每服三錢拌赤砂糖三錢黃酒調服四五次即腹痛亦愈附醫案壺蘆山人治峭岐繆金官年四十餘七月中旬病痢延至八月中旬延余治腹不痛而後重不爽胃呆不醒所下穢水如糖芋頭汁閲醫方有用溫者有用涼者雜治罔效豫用焦楂肉銀花炭地榆炭益元散茯苓木通枳殼芩芍陳米煎服三劑繼進黃鱔灰如法服之七日霍然半月以來始知飢進食未下床也更心中覺飢適有煮爛豬肺在床頭尚未冷極盡吃之因又下痢赤少白多復延豫治進青麟丸二錢下宿垢頗多又疏投白芍楂肉檳榔香連丸炮薑糞多凍少又進理中丸合資生丸日服過冬至方愈下痢五色及凍如魚腦下痢五色及凍如魚腦者方書咸謂之死症余所見者治之得法無不中竅常用豬小腸油膩垢刮下瓦上炙焦黃色研末陳酒調服三四條即愈腹痛者亦效蓋小腸人之分金爐飲食由胃而下至此始化糟粕歸於大腸為屎水飲化入膀胱為瘦屬丙火故亦曰赤腸火熱下迫失其傳化故病滯下痢久刮腸膏便如魚腦或如五色即以小腸之垢治之亦同氣相求之道也附五色痢醫案壺蘆山人治江陰祝藝芳明經令正患痢赤白續下五色溫之寒之攻之不應一月不愈諸醫咸謂不治延余診脈虛數腹痛後重苔白豫謂聲音清亮粥食可進未見絶證但性躁多怒非所宜也用香連丸檳榔芍藥歸身枳殼天水散兩劑青鱗丸三錢繼進豬小腸垢如法制服十日全愈痢疾發癍疹時疫痢多見發癍發疹前録繆氏説可以為法活人敗毒散銀翹諸法皆妙劑也不治痢而痢自止提發之後而熱熾舌絳者犀角地黃合以清之泄之邪結於胃者涼膈散大柴胡湯雙解散均可參用至於發白疹乃暑濕陷邪由肺胃而達皮毛最為佳兆勿藥亦痊咳嗽亦佳若轉瘧疾從少陽之樞而出均屬生機久痢傷陰大腸主津小腸主液故痢久必傷津液每見液涸舌乾齒燥唇裂言語不清者其症多險舌黑舌絳舌光舌碎舌糜均為惡候邪盡正虛者受補可愈邪少正虛者育陰卻邪可救二三邪盛者必致津枯液盡而斃附孫御千薑體乾兩先生醫案乾隆戊子七月十六日無錫太平橋季姓室祝氏患痢極重請孫薑兩翁診視是日孫先至痢已半月矣五色相雜初起錢醫治之因症由瀉轉痢為脾傳腎之臟病用炮薑白朮石脂龍骨蘄艾人參一派辛溫之藥反佐黃連烏梅病勢日重飲食日減面色晦滯精神困頓已極診脈細澀不和右尺急搏按之時又鼓指手溫足冷有時微熱舌苔白心中煩腹痛後重如初孫曰此非臟病內傷乃暑濕內郁腸胃初未外達邪未去而陰自耗液已虧矣擬和陰潤燥之劑用阿膠白芍炙草銀花炭扁豆花大沙參丹皮茯苓陳米煎湯代水是夜只痢三次煩痛亦減但神倦似睡汗微出舉家咸喜病減又疑欲脫孫曰微微汗出乃暑濕外泄陽得陰則融解耳十七早薑體乾到同診脈象虛澀如雨沾沙薑曰未刻交白露節正氣已衰當備人參阿膠白芍炙草薑汁黃連白扁豆花荷梗神麯廣皮陳米煎湯服一時許即索粥神思稍清而能安臥惟仍滯漏小便澀少口中乾燥飲以麥冬湯至夜小便二次痢竟矣十八日前方去川連神麯白扁豆花加麥冬小麥養心調理令服四劑而愈陳韶九按暑為無形之邪最易灼爍陰液故用膠芍炙甘草以救陰津銀花扁豆以卻暑邪而諸病如失昧者議為滋膩滯濕留濕不知先生已從前辛溫之劑探得真情矣故放膽用之而效收鼓桴也孫御千云丁亥六月侄某患痢極重治療月餘已愈然不能戒口戒怒復發至閏七月二十日日沒時人事昏沉更定後方蘇余診其脈細弱無神右關為最腹如仰瓦臍右動氣大如雞卵跳動不息中虛已極生氣索然投以建中病勢不減次日延薑體乾視案云久痢傷陰肉削形奪姑以養陰清燥之法治之用阿膠沙參生白芍炙草生白扁豆桑葉天冬二劑下午神已不昏再邀體乾同診之案云下痢腸垢五十餘日猶腹痛抽制憔悴尪羸殆甚几几欲脫矣雖胃中有滯勢難消散急救其陰以戀其陽倣佛復脈之意大生地天麥冬阿膠白芍藥沙參炙草毋過煎三五十沸即服取濁藥輕投之意八月初六日臍旁動氣已平腹亦漸厚痢亦減腹不制痛惟所下垢中有白點不已衆皆望愈矣豫同薑戚再診之案云診脈左弱右軟有神連進復脈法中宮柔和而神亂煩躁俱止有津回液轉之機此時不問其虛安問其餘用大生地麥冬大沙參白芍阿膠鮮藕大片井水煎五十沸服自此之後餘證俱減家貧不能服參日啖羊肉斤許方快又延一月面浮足腫而斃是役也雖未收功實因病久反復多端而醫方另出一種亦堪傳也陳韶九按救陰之後大約胃氣不能醒復中虛難建所致若歸咎於家貧不能服參非計也痢疾厄逆痢疾厄逆初起決無是證或邪甚致此或誤治致此皆為惡候大抵中氣大傷邪正混合不清有以致此耳其有濕熱上衝者諸熱衝上皆屬於火也丹溪法可遵中氣虛寒理中可投然必鶩溏溲白者方可用寒熱錯雜者連理湯若赤白相兼瀉心湯芍藥湯加參為妥若邪未盡而正大傷僻出無度終難挽救再按景嶽主乎中虛氣逆必降氣調氣最屬近理臨症者宜參之附醫案嘉慶庚辰七月初壺蘆山人治祝誠齋姻伯下痢赤白乾嘔不止豫同祝晉垣姻丈同診脈數大苔白膩一團暑濕鬱結於內晝夜四五十次議進倉廩湯三劑繼進芍藥湯去桂服一帖痢少減去制軍又服一帖痢又減而干惡不止遂微厄逆服橘餅湯即止逮後其湯不靈厄聲連續不已進半夏瀉心湯加白芍檳榔沉香汁下稀糞頗多赤白漸少而厄終不止用刀豆子丁香柿蒂亦不應已越十四日矣細思老翁平素思慮過度痔瘍脫肛中氣必虛所下稀糞如水已無裡急後重之苦當作胃虛厄逆治因促其邀戚君燦辰來城同議戚君至亦曰中虛厄逆無疑議進人參連理湯厄如故加附子於前方中二劑而痢止厄平計厄十一日方止調理半月康復如舊噤口痢胃中有濕熱之氣蒸熏清道以致濁氣上干胃口壅塞或作惡或作嘔吐湯水不能納雖曰極重之症然致疾之由不一有挾肝火者木剋土也有火逆上衝者諸逆衝上皆屬於火也有挾痰挾飲挾濕或寒熱錯雜者皆濁在上也宜諦審其因而治之無不中竅丹溪用人參石蓮子散等分煎服但得一口下咽濕熱即開又用田螺麝香搗爛捲臍內引熱順下而行頗效丹方用五穀蟲炙焦研三錢米飲湯送下此皆前人定法然宜按症施治熱則清之寒則溫之濕則燥之分利之邪陷則發之鬱則疏之方為妥善繆仲醇治噤口痢神效方緑升麻一錢酒炒人參一錢蓮肉三十粒去芯炒焦黃酒一盅煎半杯飲之蜜和為丸更妙每服四錢白湯送又制滯下如金丸治各種痢疾惡心欲吐即噤口痢用人參一錢多加石蓮肉升麻八分醋炒白芍三錢酒炒白扁豆炒三錢花亦可用胎前痢婦人胎前患痢疾邪陷者宜提散邪滯者宜疏利有火者宜清潤與治常人下痢之法同但不可用傷胎藥大黃可用青麟丸不可用因中有車前滑石故也檳榔雖下氣其性下墜亦宜酌用每見遇此等病動欲安胎執用芩術不知芩可用而術斷不可用每多誤事須知痢一日不止胎氣一日不安急去其邪邪去痢止則胎不安而安也普明子曰余治此症仔細揣摩忽見燭光遂恍然有得思火性上炎者何以下降於腸中而為痢良由積熱在中或為外感風寒所閉或為飲食所遏以致火氣不得舒伸逼迫於下而裡急後重也醫者不察更用檳榔等下墜之劑愈降而痢愈甚矣余因制治痢散以治痢疾初起良驗産後痢胎前患痢治不得法多致傷胎無論小産正産邪未盡而延至産後者即謂之産後痢此極重之症也古人謂之七日死張路玉以伏龍肝湯丸用之於濕熱已消但見稀水薄糞而無實火者誠然有效若濕熱之邪未清舌紅或黃唇燥口渴腹痛後重窘迫者均非所宜每見醫家治此症不肯用苦寒藥宗張氏三禁之論又據丹溪産後不用白芍之説不肯用黃芩白芍病者煩躁不安揚手擲足而斃者深為慘傷吾鄉戚孟揚先生亦云苦寒宜忌致局於迂執之見無法起死回生又無明師可以折衷思之至忘寢食一夕不禁憬然悟曰仲景為醫中之聖傷寒已得先輩口訣心法金匱一書豈不可與傷寒心法通之乎從此用功金匱寤寐神遊讀至産後熱痢用白頭翁湯一條恍然於苦寒之劑先聖未嘗禁用只要辨證清楚耳余自庚子年至今常用黃連阿膠湯黃芩湯瀉心湯皆應手取效是知濕火下陷萬不可用溫燥也又有並非胎前下痢産後復數日下痢者亦如上法切勿用溫燥之劑均宜明辨六經表裡寒熱陰陽虛實八字而治之萬無一失陳韶九按胎前患痢産後不止七日必死此言營虛而邪火熾甚忌于禁用苦寒不死何待醫者不知變通之過也然亦不可執一若久而虛滑者宜朮附訶粟並進下陷者升麻兼用豫曾驗過初謂獨得之祕不知先生已先得我心矣附醫案道光庚子七月壺蘆山人治章嘉鰲令正懷胎七月患痢七日即産産後痢仍不止舌絳無津口渴唇燥裡急後重徐炳衡邀豫診脈弦數大煩躁不安暑邪化燥加以新産後營血大傷邪火反熾議進黃連阿膠湯用荷葉陳米煎湯代水一劑痢少減又進一劑痢雖減舌絳口渴如故自汗身熱益甚其脈洪大內有實火也與西瓜汁進玉女煎荷米湯代水煎服一劑熱退汗少再劑諸恙皆痊又治祝塘一婦胎前患痢裡急後重腹痛澼出日夜無度醫進膠艾肉果四物又進杜仲芩術等安胎藥痢更劇三日而胎殞産後易女科用生化湯加荊芥牛膝山楂病者熱甚昏厥始延豫治脈數滑舌絳干內外皆熱而腹痛異常痛即痢痢復痛循環不已無刻得安此營血已耗誤投溫補助火劫陰而暑濕熱三氣未經外達內消以致如此危險極矣議進黃連阿膠湯諸醫皆曰不可服後病勢依然腹痛甚即厥法在不治沉思良久究因邪陷少陰故口渴舌絳心煩又見厥陰之腹痛下痢陽明之嘔惡不納似可與白頭翁合用將黃連阿膠湯為主取白頭翁一味以升清用白芍甘草銀花地榆夏枯草金鈴子玉桔梗滑石荷葉陳米一劑稍安連進三劑又用鮮荷葉枇杷葉金銀花鮮稻葉蘆根西瓜翠蒸露頻進又頻進西瓜汁經治第七日身發白㾦而夾紅疹痢止仍進花露荷米煎益元散可見痢由暑濕為患即伏暑之陷入者方書皆以內傷瀉痢混同論治即張氏醫案亦毫無足取惟仲景法乃法王手眼又治琴川大東門外白場米鋪葉姓婦甘三歲懷孕九月忽患霍亂吐瀉一日而産産後下痢赤白裡急後重一日夜五十餘次腹痛甚厲痛則汗出煩躁口渴不寐諸醫作瘀血腹痛失笑散桃仁延胡索香附等一派辛溫破血之劑痛痢更甚越五日而延豫診脈弦大而數苔白厚唇乾面白時有火升噁心不納僉曰瘀血余問産婦痛狀謂豫曰痛而痢痢而痛減少停又痛痛勢直趨後陰如欲大便者此因滯下而痛也痛在少腹凝滯於宮胞門大便不轉矢氣但所下無多旋又苦痛不堪耳余謂此痛隨痢減滯下之常非瘀也其姑曰何以無惡露豫曰吐瀉傷胎其血必少亡陰故也為定一方桂炒白芍萸炒黃連土炒當歸炮薑楂炭益元散廣皮木香汁檳榔汁乾荷葉蒂陳米赤砂糖脈不甚數用伏龍肝煎湯代水以溫中止嘔服後宿垢大下腹痛即止明日再診原方去木香檳榔薑連另服香連丸明午又診下痢尚三十次白凍中有紅血點畏寒蜷臥汗出過多鼻準之汗如珠頭亦多汗脈象虛弱不數告其翁姑曰恐亡陽變脫用製附子白芍炮薑歸身龍牡茯苓洋參炙草陳米淮小麥紅棗另服香連丸五分以清濕熱兩劑汗止所下純白凍尚二十餘次而不知飢忽惡寒發抖伸手診脈片刻即縮入被內懶言氣短聲微皆不足之象用桂枝炮薑白芍丹參炙草朱茯神棗仁黨參歸身荷米等補養之劑又服豬小腸垢方三服日進稀粥一盞而胃口不醒伊夫又病伏暑房中皆羌防荊芥之氣令其撤去藥爐而焚以紅棗室中煎紅棗粥烹鮮鯽魚湯令聞其香氣由是胃口大開白凍亦少止十餘日杳無音信一日過其門而問之知其夫死而婦活矣當其日診其婦竟未請一診其夫此亦有數存焉時咸豐丙辰九月也休息痢痢時止時作纏綿不已者曰休息痢其來有二一誤於醫家撤邪不清或早補或早澀一誤於病家自以為小恙服食尚可不以為意遷延時日正氣日衰邪氣尚留而不去者亦有食物不謹舊積未去新積又生者致時發時止竟有數十年不愈者延至脾腎兩虧面浮足腫痢仍不止而斃皆屬邪正同歸於盡而死故患痢者必須早治以斷其根與時症無異治法並宜察脈辨證分別寒熱虛實而治附休息痢又感新邪案云間清白里老醫治南匯徐某休息痢已二年因冒暑傷濕而裡急後重身熱下血陳醫進七味地黃湯熱更甚脈洪大即用黃連白芍柴胡黃芩木通滑石枳殼厚朴甘草四劑熱減痢清再投涼血理滯新邪退而舊病亦愈老人虛人患痢老人虛人氣血兩虧暑濕熱與食滯交蒸而致成痢治法尤難萬不可因循乘其初起元氣未漓發表攻裡相須圖治所謂無糧之師貴在速戰也若畏虛養病遷延時日多致不救附醫案云間清白里老醫治胡正之年七十二歲先胸膈不舒飲食不得達下者兩月自以為膈症與老友訣別往太倉調理八月初患痢裡急後重腹痛血積稠黏肛門如灼飲食不納諸醫以年老氣血衰耗以培脾健胃為主痢更甚且煩躁內熱噁心其勢危急邀余診脈息數大面帶紅色小便不利後重逼迫煎藥入口即吐用大黃檳榔川朴枳殼黃芩為丸與服下大紅積甚多胸膈稍舒熱勢更甚以西瓜汁益元散徐徐與之自覺爽快即以芩連枳殼木通川朴白芍滑石檳榔汁三帖大去積垢頗覺神思困倦以獨參湯飲之其夜少寐然腹痛後重未除又以參湯送檳黃丸攻補兼用去積滯不計仍用益元散西瓜汁調服腹始不痛肛始不熱積滯已除頗思粥飲漸漸加餐胸膈舒暢食物可進月餘而愈壽八十有三此高粱厚味凝滯胃中因滯下而新疾舊恙皆瘳愚按此案合潔古所云小制湯丸纍纍加之關扃自透故膈症愈觀此案可通治膈症之法也膈症非痰即瘀凝滯胸膈者又治蘇城齊門外蔣奶奶寡居七載勞心抑鬱肝氣不得條達體質極虛夏初患滯下腹痛後重胸膈不寬而噁心葉天士以為不足之症用人參人乳等調補而劇余適在吳門延豫診治脈息弦大帶數腹痛後重肛門如烙口乾氣急此肝家有鬱火挾濕下注而為滯下上升而為嘔惡胸膈不寬用黃芩芍藥湯加厚朴枳殼香附山梔黃連木通滑石一劑腹痛頓除飲食可進連四劑痢止胸寬後用香附廣皮黃芩黃連厚朴枳殼山梔理氣清火郁舒而愈小兒痢小兒患痢與大人治法無異蓋所受之暑濕熱同也惟腸胃柔脆難於克伐而又喜食雜物其積滯比大人尤甚八九歲者尤可詢其病情痛與不痛熱與不熱以察病之輕重邪之淺深若三歲以下不能自述病情全賴醫者察色聽聲以諦察其病之虛實寒熱方無差誤附醫案姚公遠幼子病痢一醫誤下之遂下純血氣喘身熱不思食繆仲醇適至急以人參五錢白芍石蓮升麻橘紅石蠶白扁豆滑石炙草投一劑而喘平血止又數劑痢止仲醇臨別囑公遠曰兒雖愈百日內不出痘則生否則死以元氣未復故也未幾即痘果殤內經云下痢發熱者死指雜病濕熱下痢而言仲景云下痢手足不冷反發熱者不死指傷寒陰邪內出而言附通用諸方敗毒散香連丸青麟丸龍薈丸滯下丸芍藥湯桂元肉包苦參子豬小腸垢灰治痢散治痢奇方川連川朴青廣皮枳殼檳榔山楂木香白芍黃芩地榆歸尾桃仁紅花草東風散黃芩檳榔枳殼山楂青皮川朴當歸白芍炙草肢冷加肉桂熱甚加黃連兼瘧加柴胡紅痢加桃仁紅花地榆白痢加香附陳皮芍藥湯白芍茯苓官桂甘草檳榔木香歸尾川連滯加枳殼後重加升麻臟毒加黃柏血弱加膠薑芎柏燥糞加大黃
