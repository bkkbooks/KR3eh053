front:
  text: 陳序吾嘗讀王旭高醫書治痢奇方一湯用之神驗云此方出自華墅薑體乾先生且華墅多名醫繼往開來代有聞人因考薑先生為清咸豐時人醫名震大江南北同時復有吳君甫恬與薑先生為至友出其緒餘著有痢疾明辨一書語發前人所未發堪為醫學津梁惜未梓板世無傳本張君宗耀豫之畏友也籍江陰華墅於治險危痢疾無不奇效因疑先生亦得有吳先生真傳者庚辰春豫遷居錫城與先生過從為密因叩以先生治痢獨多奇效得毋藏有華墅先哲之祕本歟先生曰然遂於篋中檢出痢疾明辨一書曰此即甫恬先生之真本豫之所賴以治驗者也假歸讀之如獲拱璧遂商之先生擬為公開梓板為蒼生造福為國粹爭光有此一書西洋治痢特效藥不足稱豪於一時矣豈不快哉民國二十九年庚辰夏五月陳韶九識自序嘗謂醫者意也通其意則靈不通其意則滯善用其意則巧不善用其意則拙豫嘗有句云醫林漫説祕青囊活法全憑用意良又云讀書泥古非師古因證施方不執方甚矣醫貴通其意又必善用其意也何則道本無言一落言詮便相失矣渾言之而無所不通者聖言也專言之而條分縷析者凡言也然規矩在此繩墨亦在此熟於規矩繩墨之成法而能因事制宜處處參以活法而又動合古法斯得之矣即如痢疾一門外因六氣之邪內因飲食之積又兼感時厲之氣合而成病乃時氣也古之醫書每以臟病內傷下痢混同論治執死法者滯而不圓拘古法者泥而不變爰著痢疾之明辨分六經列四綱箝種種見證以及婦女胎産四十年來由折肱而心悟由心悟而知古今之得失一一辨之以俟後學君子有通其意而善用其意者是豫之所望也咸豐七年歲次丁巳閏五月之吉澄吳士英甫恬氏序吳序澄江之東南隅有龍砂山瑰奇靈秀代生名醫清道咸間有吳公甫恬醫名噪遐邇髻齡聞前輩談吳公軼事公於醉後診新産婦投以安胎藥隨診者不敢下筆先生促之翌日酒醒方疑慮間而病家來云復生一兒公乃狂喜曰吾三指固未嘗醉也鎮江將軍女病聞吳公名以重金聘之診公誤為妾媵也診畢謂將軍曰非病也且喜得男將軍默然少頃公方饈將軍出謝曰先生果名醫也以一盤捧上蓋破腹而出者也公大驚由此得心疾其門下傳抄有痢疾明辨一書云傳自喻嘉言之甥舒進賢其大旨以南陽傷寒論六經為主中分邪陷外感六經陷下之邪秋燥及時毒即疫痢滑脫四門實為痢證特開生面並能闡發傷寒論之精義涵竊以是書為可傳不敢自祕爰加校勘録數語於簡端民國十一年暨陽後學吳文涵謹序
